<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Profile</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0d0d0d;
            color: #ffffff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }
        .container {
            width: 100%;
            max-width: 400px;
            text-align: center;
            padding: 20px;
            box-sizing: border-box;
        }
        .avatar {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            margin-bottom: 15px;
            object-fit: cover;
            border: 2px solid #fff;
        }
        .name {
            font-size: 20px;
            font-weight: 600;
            margin-bottom: 25px;
            letter-spacing: -0.5px;
        }
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
            width: 100%;
        }
        .link-btn {
            background-color: #ffffff;
            color: #000000;
            padding: 16px;
            border-radius: 30px;
            text-decoration: none;
            font-weight: 600;
            font-size: 16px;
            transition: transform 0.1s ease;
            box-shadow: 0 4px 12px rgba(255,255,255,0.1);
        }
        .link-btn:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>
    <div class="container">
        <img class="avatar" src="avatar.jpg" alt="Avatar">
        
        <div class="name">Hey, it's me</div>
        
        <div class="links-container">
            <a href="https://t.me/+wvguCrjrdcsyMmMy" class="link-btn" target="_blank">Chat With Me</a>
            <a href="https://t.me/+wvguCrjrdcsyMmMy" class="link-btn" target="_blank">Exclusive Content</a>
        </div>
    </div>
</body>
</html>
